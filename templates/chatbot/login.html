{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion • AssurBot</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="app">

    <!-- SIDEBAR IDENTIQUE -->
    <aside class="sidebar">
        <h2>🛡️ AssurBot</h2>
        <p>Assistant IA assurance</p>

        <small>
            Auto • Santé • Habitation • Banque / Immobilier
        </small>
    </aside>

    <!-- MAIN -->
    <main class="main" style="justify-content: center; align-items: center;">

        <div style="width:100%; max-width:420px;">

            <h1 style="text-align:center; margin-bottom:20px;">
                Connexion
            </h1>

            <p class="subtitle" style="text-align:center; margin-bottom:30px;">
                Accédez à votre assistant assurance premium.
            </p>

            <form method="post" class="input-area" style="flex-direction:column;">
                {% csrf_token %}

                <input
                    name="username"
                    type="text"
                    placeholder="Nom d’utilisateur"
                    required
                >

                <input
                    name="password"
                    type="password"
                    placeholder="Mot de passe"
                    required
                >

                <button type="submit">
                    Se connecter
                </button>
            </form>

        </div>

    </main>

</div>

</body>
</html>
