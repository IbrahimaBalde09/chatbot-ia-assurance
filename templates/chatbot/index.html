<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot IA Assurance</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #343541;
      color: #fff;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      padding: 15px;
      text-align: center;
      background: #202123;
      font-weight: bold;
      font-size: 18px;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 15px;
    }

    .user {
      align-self: flex-end;
      background: #0b5ed7;
    }

    .bot {
      align-self: flex-start;
      background: #444654;
    }

    .input-container {
      display: flex;
      padding: 15px;
      background: #40414f;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 12px 18px;
      border: none;
      background: #19c37d;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #16a268;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="header">
      🤖 Chatbot IA Assurance
    </div>

    <div id="chat-box">
      <div class="message bot">
        Bonjour 👋 je suis votre assistant assurance. Posez votre question !
      </div>
    </div>

    <div class="input-container">
      <input id="input" placeholder="Écrivez votre message..." />
      <button onclick="sendMessage()">Envoyer</button>
    </div>

  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("input");

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "message " + type;
      div.innerText = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      input.value = "";

      const typing = document.createElement("div");
      typing.className = "message bot typing";
      typing.innerText = "Le chatbot réfléchit...";
      chatBox.appendChild(typing);

      try {
        const res = await fetch("/api/chat/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        typing.remove();

        addMessage(data.response || data.error, "bot");

      } catch (err) {
        typing.remove();
        addMessage("Erreur serveur ❌", "bot");
      }
    }

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
