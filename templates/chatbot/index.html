<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot IA Assurance</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .header {
      background: #0b5ed7;
      color: white;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    #chat-box {
      height: 450px;
      overflow-y: auto;
      padding: 20px;
      background: #fafafa;
    }

    .message {
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .user {
      text-align: right;
    }

    .user .bubble {
      background: #0b5ed7;
      color: white;
      display: inline-block;
      padding: 10px 14px;
      border-radius: 14px 14px 0 14px;
      max-width: 75%;
    }

    .bot .bubble {
      background: #e9ecef;
      color: #222;
      display: inline-block;
      padding: 10px 14px;
      border-radius: 14px 14px 14px 0;
      max-width: 75%;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #ddd;
      background: white;
    }

    #message-input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      background: #0b5ed7;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #094db1;
    }

    .typing {
      color: #666;
      font-style: italic;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Chatbot IA Assurance</div>

    <div id="chat-box">
      <div class="message bot">
        <div class="bubble">Bonjour, je suis votre assistant assurance. Posez votre question.</div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="message-input" placeholder="Écrivez votre message..." />
      <button onclick="sendMessage()">Envoyer</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("message-input");

    function addMessage(text, sender) {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${sender}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      wrapper.appendChild(bubble);
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      input.value = "";

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.id = "typing";
      typing.textContent = "Le chatbot réfléchit...";
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch("/api/chat/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        document.getElementById("typing")?.remove();

        if (data.response) {
          addMessage(data.response, "bot");
        } else {
          addMessage(data.error || "Erreur inconnue.", "bot");
        }
      } catch (error) {
        document.getElementById("typing")?.remove();
        addMessage("Erreur de connexion au serveur.", "bot");
      }
    }

    input.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
