<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot IA Assurance</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #343541;
      color: #fff;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      padding: 15px 20px;
      text-align: center;
      background: #202123;
      font-weight: bold;
      font-size: 18px;
      position: relative;
    }

    .reset-btn {
      position: absolute;
      right: 16px;
      top: 10px;
      background: #555;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .reset-btn:hover {
      background: #666;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #0b5ed7;
    }

    .bot {
      align-self: flex-start;
      background: #444654;
    }

    .input-container {
      display: flex;
      padding: 15px;
      background: #40414f;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    button.send-btn {
      padding: 12px 18px;
      border: none;
      background: #19c37d;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button.send-btn:hover {
      background: #16a268;
    }

    .typing {
      font-style: italic;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      🤖 Chatbot IA Assurance
      <button class="reset-btn" onclick="resetConversation()">Réinitialiser</button>
    </div>

    <div id="chat-box"></div>

    <div class="input-container">
      <input id="input" placeholder="Écrivez votre message..." />
      <button class="send-btn" onclick="sendMessage()">Envoyer</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("input");
    const STORAGE_KEY = "chatbot_assurance_history";

    function getHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveHistory(history) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "message " + type;
      div.innerText = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function renderHistory() {
      chatBox.innerHTML = "";
      const history = getHistory();

      if (history.length === 0) {
        addMessage("Bonjour 👋 Je suis votre assistant assurance. Posez votre question.", "bot");
        return;
      }

      for (const item of history) {
        addMessage(item.content, item.role === "user" ? "user" : "bot");
      }
    }

    function resetConversation() {
      localStorage.removeItem(STORAGE_KEY);
      renderHistory();
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      const history = getHistory();
      addMessage(message, "user");
      input.value = "";

      const updatedHistory = [...history, { role: "user", content: message }];
      saveHistory(updatedHistory);

      const typing = document.createElement("div");
      typing.className = "message bot typing";
      typing.innerText = "Le chatbot réfléchit...";
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch("/api/chat/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            history: history
          })
        });

        const data = await res.json();
        typing.remove();

        const botText = data.response || data.error || "Erreur inconnue";
        addMessage(botText, "bot");

        const finalHistory = [...updatedHistory, { role: "assistant", content: botText }];
        saveHistory(finalHistory);

      } catch (err) {
        typing.remove();
        const botText = "Erreur serveur ❌";
        addMessage(botText, "bot");
        const finalHistory = [...updatedHistory, { role: "assistant", content: botText }];
        saveHistory(finalHistory);
      }
    }

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendMessage();
    });

    renderHistory();
  </script>
</body>
</html>
